<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>財務管理系統</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="財務管理">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/app.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3B82F6',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Mobile Top Navigation (hidden on desktop) -->
  <div id="mobile-nav">
    <div class="mobile-header">
      <h1>💰 財務管理</h1>
      <span class="mobile-header-date" id="mobile-date"></span>
    </div>
    <div class="mobile-nav-row" id="mobile-nav-row">
      <a href="#dashboard" class="mobile-nav-item" data-page="dashboard">
        <span class="nav-icon">📊</span><span>總覽</span>
      </a>
      <a href="#transactions" class="mobile-nav-item" data-page="transactions">
        <span class="nav-icon">💳</span><span>收支</span>
      </a>
      <a href="#events" class="mobile-nav-item" data-page="events">
        <span class="nav-icon">🎯</span><span>活動</span>
      </a>
      <a href="#banks" class="mobile-nav-item" data-page="banks">
        <span class="nav-icon">🏦</span><span>銀行</span>
      </a>
      <a href="#subscriptions" class="mobile-nav-item" data-page="subscriptions">
        <span class="nav-icon">🔄</span><span>訂閱</span>
      </a>
      <a href="#tw-stocks" class="mobile-nav-item" data-page="tw-stocks">
        <span class="nav-icon">🇹🇼</span><span>台股</span>
      </a>
      <a href="#us-stocks" class="mobile-nav-item" data-page="us-stocks">
        <span class="nav-icon">🇺🇸</span><span>美股</span>
      </a>
      <a href="#settings" class="mobile-nav-item" data-page="settings">
        <span class="nav-icon">⚙️</span><span>設定</span>
      </a>
    </div>
  </div>

  <!-- Sidebar (desktop only) -->
  <div id="sidebar" class="fixed top-0 left-0 h-full w-56 bg-gray-900 text-white flex flex-col z-10 shadow-xl">
    <div class="px-5 py-5 border-b border-gray-700">
      <h1 class="text-lg font-bold text-white">💰 財務管理</h1>
      <p class="text-xs text-gray-400 mt-1">個人理財系統</p>
    </div>
    <nav class="flex-1 py-4 overflow-y-auto">
      <a href="#dashboard" class="nav-link" data-page="dashboard">
        <span class="nav-icon">📊</span> 總覽
      </a>
      <a href="#transactions" class="nav-link" data-page="transactions">
        <span class="nav-icon">💳</span> 收支記錄
      </a>
      <a href="#events" class="nav-link" data-page="events">
        <span class="nav-icon">🎯</span> 活動記帳
      </a>
      <div class="px-4 pt-4 pb-1">
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">帳戶管理</p>
      </div>
      <a href="#banks" class="nav-link" data-page="banks">
        <span class="nav-icon">🏦</span> 銀行設定
      </a>
      <a href="#subscriptions" class="nav-link" data-page="subscriptions">
        <span class="nav-icon">🔄</span> 訂閱管理
      </a>
      <div class="px-4 pt-4 pb-1">
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">股票投資</p>
      </div>
      <a href="#tw-stocks" class="nav-link" data-page="tw-stocks">
        <span class="nav-icon">🇹🇼</span> 台股
      </a>
      <a href="#us-stocks" class="nav-link" data-page="us-stocks">
        <span class="nav-icon">🇺🇸</span> 美股
      </a>
      <div class="px-4 pt-4 pb-1">
        <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">系統</p>
      </div>
      <a href="#settings" class="nav-link" data-page="settings">
        <span class="nav-icon">⚙️</span> 設定
      </a>
    </nav>
    <div class="px-4 py-3 border-t border-gray-700">
      <p class="text-xs text-gray-500" id="sidebar-date"></p>
    </div>
  </div>

  <!-- Main Content -->
  <div class="ml-56 min-h-screen">
    <div id="app-content" class="p-6">
      <div class="text-center py-20 text-gray-400">載入中...</div>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
    <div id="modal-container" class="bg-white rounded-xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-xl z-50 text-sm transition-all"></div>

  <!-- Scripts (load order matters) -->
  <script src="js/store.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/services/stock-price.js"></script>
  <script src="js/components/modal.js"></script>
  <script src="js/components/charts.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/transactions.js"></script>
  <script src="js/pages/events.js"></script>
  <script src="js/pages/banks.js"></script>
  <script src="js/pages/subscriptions.js"></script>
  <script src="js/pages/tw-stocks.js"></script>
  <script src="js/pages/us-stocks.js"></script>
  <script src="js/components/notion-sync.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {
          // SW registration failed (e.g. opening file:// directly) — app still works normally
        });
      });
    }
  </script>
</body>
</html>
